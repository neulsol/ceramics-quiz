<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나에게 어울리는 도자기는?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --cream:#F7F2EA; --warm:#EDE4D6; --brown:#6B4F35;
  --bl:#8B6B4A; --bd:#3D2510; --text:#2A1A0A;
  --muted:#8A7A6A; --white:#FEFCF8; --border:#D4C4B0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;
  padding:0 16px 60px;
}
.wrap{width:100%;max-width:420px;}
.screen{display:none;}
.screen.active{display:block;animation:up .32s ease;}
.ls{display:none;}
.ls.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ─────────────────────────────
   ① 시작 화면 — 여백·리듬 개선
───────────────────────────── */
#s-start{
  padding-top:72px;
}
.eyebrow{
  font-size:11px;font-weight:500;letter-spacing:.14em;
  color:var(--bl);text-transform:uppercase;
  text-align:center;margin-bottom:32px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.eyebrow::before,.eyebrow::after{
  content:'';flex:1;height:1px;background:var(--border);max-width:48px;
}
.s-title{
  font-family:'Nanum Myeongjo',serif;
  font-size:44px;font-weight:800;
  color:var(--bd);line-height:1.22;
  margin-bottom:18px;letter-spacing:-.02em;
  text-align:center;
}
.s-sub{
  font-size:14px;color:var(--muted);line-height:1.85;
  margin-bottom:52px;text-align:center;
}
.s-btn{
  display:block;width:100%;
  padding:18px;background:var(--bd);color:var(--cream);
  border:none;border-radius:14px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:15px;font-weight:500;
  cursor:pointer;letter-spacing:.05em;
  transition:background .2s,transform .1s;
}
.s-btn:hover{background:var(--brown);}
.s-btn:active{transform:scale(.99);}
.s-credit{
  font-size:11px;color:var(--muted);
  margin-top:20px;text-align:center;line-height:1.8;
}

/* ─────────────────────────────
   ② 질문 화면
───────────────────────────── */
#s-quiz{padding-top:48px;}
.pb-wrap{margin-bottom:32px;}
.pb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.pb-label{font-size:12px;font-weight:500;color:var(--bl);}
.pb{width:100%;height:3px;background:var(--warm);border-radius:2px;overflow:hidden;}
.pbf{height:100%;background:var(--brown);border-radius:2px;transition:width .4s;}

/* ④ 질문 텍스트 — 19px로 축소 */
.q-text{
  font-family:'Nanum Myeongjo',serif;
  font-size:19px;font-weight:700;
  color:var(--bd);line-height:1.6;
  margin-bottom:24px;
}

/* ② 선택지 — 번호 + 색상 위계 */
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;
  background:var(--white);border:1.5px solid var(--border);
  border-radius:12px;
  font-family:'Noto Sans KR',sans-serif;font-size:14px;
  color:var(--text);text-align:left;
  cursor:pointer;transition:all .18s;
}
.opt:hover{border-color:var(--bl);background:var(--cream);}
.opt.picked{border-color:var(--brown);background:var(--brown);color:var(--white);}
.opt.picked .opt-num{background:rgba(255,255,255,.25);color:var(--white);}

/* 번호 배지 — 1~5 색상 그라데이션 */
.opt-num{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;flex-shrink:0;
  transition:all .18s;
}
.opt[data-v="1"] .opt-num{background:#F0EBE3;color:#8A7A6A;}
.opt[data-v="2"] .opt-num{background:#E5D8C8;color:#7A6050;}
.opt[data-v="3"] .opt-num{background:#D4BFA4;color:#5A4030;}
.opt[data-v="4"] .opt-num{background:#B8966A;color:white;}
.opt[data-v="5"] .opt-num{background:#6B4F35;color:white;}
.opt-txt{flex:1;line-height:1.4;}



/* ─────────────────────────────
   로딩
───────────────────────────── */
.spin{width:36px;height:36px;border:3px solid var(--warm);border-top-color:var(--brown);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:13px;color:var(--muted);}

/* ─────────────────────────────
   결과 화면
───────────────────────────── */
#s-result{padding-top:32px;}
#share-card{
  border-radius:20px;margin-bottom:16px;
  padding:32px 28px 24px;position:relative;overflow:hidden;
  /* 배경은 유형 클래스로 지정 */
}
.rc-tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px;opacity:.6;display:block;text-align:center;}
.rc-ico{width:180px;height:180px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;overflow:hidden;background:white;}
.rc-ico img{width:100%;height:100%;object-fit:contain;}
.rc-arch{font-size:12px;margin-bottom:5px;opacity:.6;text-align:center;display:block;}
.rc-name{font-family:'Nanum Myeongjo',serif;font-size:38px;font-weight:800;line-height:1;margin-bottom:16px;letter-spacing:-.02em;text-align:center;display:block;}
.rc-kws{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:18px;}
.rc-kw{padding:4px 10px;border-radius:20px;font-size:11px;}
.rc-short{font-size:13px;line-height:1.8;text-align:left;padding:14px 16px;border-radius:12px;}
.rc-foot{margin-top:18px;padding-top:14px;display:flex;justify-content:flex-start;align-items:center;}
.rc-ft{font-size:11px;font-weight:600;opacity:.8;display:block;}
.rc-fs{font-size:10px;opacity:.4;display:block;margin-top:1px;}

.r-detail{background:var(--white);border:1.5px solid var(--bl);border-radius:14px;padding:22px 20px;margin-bottom:16px;}
.r-detail p{font-size:14px;color:#555;line-height:1.85;margin-bottom:14px;}
.r-detail p:last-child{margin-bottom:0;}
.r-detail strong{color:var(--bd);}

/* 버튼 */
.copy-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:16px;
  background:var(--bd);color:var(--cream);
  border:none;border-radius:12px;
  font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;margin-bottom:9px;transition:background .2s;
}
.copy-btn:hover{background:var(--brown);}
.save-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:15px;
  background:var(--warm);color:var(--bd);
  border:1px solid var(--border);border-radius:12px;
  font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;margin-bottom:9px;transition:all .2s;
}
.save-btn:hover{background:var(--border);}
.save-btn.busy{opacity:.6;pointer-events:none;}
.restart-btn{
  width:100%;padding:14px;border-radius:12px;
  background:transparent;color:var(--muted);
  border:1.5px solid var(--border);
  font-family:'Noto Sans KR',sans-serif;font-size:13px;
  cursor:pointer;transition:all .2s;
}
.restart-btn:hover{border-color:var(--bl);color:var(--brown);}
.r-credit{font-size:10px;color:var(--muted);line-height:1.7;margin-top:16px;text-align:center;}

/* 토스트 */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--bd);color:var(--cream);
  padding:10px 22px;border-radius:100px;
  font-size:13px;font-family:inherit;
  opacity:0;transition:all .28s;z-index:999;
  white-space:nowrap;pointer-events:none;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* 유형 컬러 */
.t-sage     {--tc:#1E5C42;--tl:#E8F4EE;--tm:#3A8060;}
.t-innocent {--tc:#4A3A28;--tl:#F5EFE4;--tm:#7A6045;}
.t-creator  {--tc:#6A2E10;--tl:#FBF0E6;--tm:#A85020;}
.t-caregiver{--tc:#3C2818;--tl:#EEE4D8;--tm:#6A4428;}
.t-revolutionary{--tc:#1E2E58;--tl:#ECEEFA;--tm:#3A50A0;}

.wrap[class*="t-"] #share-card{background:var(--tl);}
.wrap[class*="t-"] .rc-tag,.wrap[class*="t-"] .rc-arch{color:var(--tm);}
.wrap[class*="t-"] .rc-name{color:var(--tc);}
.wrap[class*="t-"] .rc-ico{background:white;}
.wrap[class*="t-"] .rc-kw{background:white;color:var(--tc);border:1px solid rgba(0,0,0,.07);}
.wrap[class*="t-"] .rc-short{background:white;color:#444;}
.wrap[class*="t-"] .rc-foot{border-top:1px solid rgba(0,0,0,.08);color:var(--tc);}
</style>
</head>
<body>
<div class="wrap" id="wrap">

  <!-- 시작 화면 -->
  <div id="s-start" class="screen active">
    <p class="eyebrow">이천도자기축제 40주년 아카이빙관</p>
    <h1 class="s-title">나에게<br>어울리는<br>도자기는?</h1>
    <p class="s-sub">
      나의 성향을 분석하여<br>
      가장 닮은 도자기 유형을 찾아드립니다.
    </p>
    <button class="s-btn" onclick="startQuiz()">테스트 시작하기 →</button>
    <p class="s-credit">Carl Jung 원형 이론 기반 · PMAI® 참고<br>15문항 · 약 3분 소요</p>
  </div>

  <!-- 질문 화면 -->
  <div id="s-quiz" class="screen">
    <div class="pb-wrap">
      <div class="pb-top">
        <span class="pb-label" id="qnum">Q1 / 15</span>
      </div>
      <div class="pb"><div class="pbf" id="prog"></div></div>
    </div>
    <div class="q-text" id="qtext"></div>
    <div class="opts" id="opts"></div>

  </div>

  <!-- 로딩 -->
  <div id="s-loading" class="ls">
    <div class="spin"></div>
    <p class="lt">결과를 분석하고 있습니다...</p>
  </div>

  <!-- 결과 화면 -->
  <div id="s-result" class="screen">
    <div id="share-card">
      <span class="rc-tag">이천도자기축제 40주년 아카이빙관</span>
      <div class="rc-ico" id="rc-ico"></div>
      <span class="rc-arch" id="rc-arch"></span>
      <span class="rc-name" id="rc-name"></span>
      <div class="rc-kws" id="rc-kws"></div>
      <div class="rc-short" id="rc-short"></div>
      <div class="rc-foot">
        <div>
          <span class="rc-ft">나에게 어울리는 도자기는?</span>
          <span class="rc-fs">이천도자기축제 아카이빙관</span>
        </div>
      </div>
    </div>

    <div class="r-detail" id="r-detail"></div>

    <button class="copy-btn" onclick="copyLink()">🔗 링크 복사하기</button>
    <button class="save-btn" id="save-btn" onclick="saveImg()">📥 이미지 저장</button>
    <button class="restart-btn" onclick="restart()">↩ 처음으로 돌아가기</button>

    <p class="r-credit">
      본 테스트는 Carl Jung의 원형 이론과 PMAI® 연구를 참고하여 제작되었습니다.<br>
      결과는 자기 탐색을 위한 참고 자료입니다.<br>
      <span style="color:#bbb;">제작: (주)웰컴그라운드</span>
    </p>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
var Q=[
  {t:"나는 세상에는 좋은 것이 더 많다고 믿는다",y:"innocent"},
  {t:"기존의 규칙이나 관습에 의문을 제기하는 편이다",y:"revolutionary"},
  {t:"나는 어떤 일이든 그 이면에 있는 진짜 의미를 이해하려고 노력한다",y:"sage"},
  {t:"주변 사람들이 편안하고 안전하게 느끼도록 돕는 것이 중요하다",y:"caregiver"},
  {t:"나만의 방식으로 무언가를 만들어내는 것이 좋다",y:"creator"},
  {t:"깊이 생각하고 분석하는 시간이 나에게는 중요하다",y:"sage"},
  {t:"정해진 틀보다 자유롭게 표현하는 것을 선호한다",y:"creator"},
  {t:"단순하고 정돈된 환경에서 마음이 편안해진다",y:"innocent"},
  {t:"실용적이고 쓸모 있는 것에 가치를 둔다",y:"caregiver"},
  {t:"변화를 이끌어내는 것이 두렵지 않다",y:"revolutionary"},
  {t:"독창적인 아이디어나 결과물을 낼 때 보람을 느낀다",y:"creator"},
  {t:"가까운 사람들을 돌보고 지원하는 일에서 의미를 찾는다",y:"caregiver"},
  {t:"익숙한 것보다 새롭고 파격적인 것에 끌린다",y:"revolutionary"},
  {t:"지식과 통찰을 얻는 것이 삶의 큰 기쁨이다",y:"sage"},
  {t:"복잡한 것보다 명료하고 깔끔한 것을 선호한다",y:"innocent"}
];
var A=[
  {t:"전혀 아니다",v:1},{t:"아니다",v:2},{t:"보통이다",v:3},
  {t:"그렇다",v:4},{t:"매우 그렇다",v:5}
];
var R={
  sage:{name:"청자",arch:"현자 (Sage) 원형",icon:"🏺",cls:"t-sage",
    kws:["깊은 사유","진리 탐구","지혜","통찰","비색"],
    short:"고려 장인이 비색을 탐구하듯, 당신은 사물의 이면에 있는 진짜 의미를 끊임없이 탐구합니다. 깊고 고요한 내면의 세계를 지닌 현자입니다.",
    desc:"<p><strong>당신에게 가장 활성화된 원형은 현자(Sage)입니다.</strong></p><p>현자는 진리를 탐구하고 세상을 깊이 이해하려는 원형입니다. 당신은 표면적인 답보다 본질적인 의미를 추구하며, 지식과 통찰을 통해 자유를 얻습니다.</p><p>고려 장인들이 비색(翡色)을 완성하기까지 수십 년을 연구했듯, 청자는 깊은 사유와 정신적 풍요를 상징합니다.</p>"},
  innocent:{name:"백자",arch:"순수자 (Innocent) 원형",icon:"🤍",cls:"t-innocent",
    kws:["순수","절제","조화","단순미","담백함"],
    short:"군더더기 없는 순백처럼, 당신은 복잡함 속에서도 본질적인 아름다움을 찾습니다. 단순함 속에 깊은 조화가 있음을 아는 사람입니다.",
    desc:"<p><strong>당신에게 가장 활성화된 원형은 순수자(Innocent)입니다.</strong></p><p>순수자는 세상의 선함을 믿고, 단순함 속에서 행복을 찾는 원형입니다. 당신은 복잡함보다 명료함을, 혼란보다 조화를 추구합니다.</p><p>조선 선비들이 백자의 담백함에서 도(道)를 읽었듯, 불필요한 것을 덜어낸 자리에서 본질적인 아름다움이 빛납니다.</p>"},
  creator:{name:"분청사기",arch:"창조자 (Creator) 원형",icon:"🎨",cls:"t-creator",
    kws:["창의","자유","개성","독창성","실험"],
    short:"자유로운 붓질로 나만의 무늬를 새기듯, 당신은 정해진 틀 밖에서 가장 빛납니다. 모든 것에 당신만의 흔적을 남기는 창조자입니다.",
    desc:"<p><strong>당신에게 가장 활성화된 원형은 창조자(Creator)입니다.</strong></p><p>창조자는 자기만의 방식으로 세상을 표현하려는 원형입니다. 당신은 정해진 틀보다 자유로운 표현을 선호하며, 독창적인 결과물을 만들어낼 때 진정한 자신을 느낍니다.</p><p>귀얄 자국이 장인의 손길을 고스란히 담듯, 당신이 만들어내는 모든 것에는 당신만의 흔적이 새겨집니다.</p>"},
  caregiver:{name:"옹기",arch:"돌봄이 (Caregiver) 원형",icon:"🪴",cls:"t-caregiver",
    kws:["따뜻함","실용","돌봄","안정","가정"],
    short:"숨 쉬는 흙이 발효를 돕듯, 당신은 곁에 있는 것만으로 사람들에게 힘이 됩니다. 관계 속에서 진정한 의미를 찾는 든든한 존재입니다.",
    desc:"<p><strong>당신에게 가장 활성화된 원형은 돌봄이(Caregiver)입니다.</strong></p><p>돌봄이는 타인을 보살피고 안전하게 지켜주려는 원형입니다. 당신은 주변 사람들이 편안하게 느끼도록 돕는 것에서 의미를 찾으며, 실용적이고 쓸모 있는 것에 가치를 둡니다.</p><p>옹기가 김치와 장을 익게 하며 가정을 지켜왔듯, 당신은 가까운 사람들의 삶을 더 풍요롭게 만드는 든든한 존재입니다.</p>"},
  revolutionary:{name:"현대도자",arch:"반항아 (Revolutionary) 원형",icon:"💎",cls:"t-revolutionary",
    kws:["혁신","파격","변화","도전","새로움"],
    short:"도자기란 무엇인가를 끊임없이 질문하는 현대도자처럼, 당신은 당연한 것에 물음표를 던지는 개척자입니다.",

var cur=0, sc={}, curType="";
function g(id){return document.getElementById(id);}

function show(id){
  document.querySelectorAll(".screen,.ls").forEach(function(e){e.classList.remove("active");});
  g(id).classList.add("active");
  window.scrollTo(0,0);
}

function startQuiz(){
  cur=0;
  sc={sage:0,innocent:0,creator:0,caregiver:0,revolutionary:0};
  show("s-quiz");
  renderQ();
}

function renderQ(){
  var q=Q[cur];
  g("prog").style.width=(cur/Q.length*100)+"%";
  g("qnum").textContent="Q"+(cur+1)+" / "+Q.length;
  g("qtext").textContent=q.t;
  var c=g("opts"); c.innerHTML="";
  A.forEach(function(a){
    var b=document.createElement("button");
    b.className="opt";
    b.setAttribute("data-v", a.v);
    // 번호 배지
    var num=document.createElement("span");
    num.className="opt-num";
    num.textContent=a.v;
    // 텍스트
    var txt=document.createElement("span");
    txt.className="opt-txt";
    txt.textContent=a.t;
    b.appendChild(num);
    b.appendChild(txt);
    b.onclick=function(){pick(a.v,q.y,b);};
    c.appendChild(b);
  });
}

function pick(v,y,btn){
  sc[y]+=v;
  btn.classList.add("picked");
  document.querySelectorAll(".opt").forEach(function(b){b.style.pointerEvents="none";});
  setTimeout(function(){
    cur++;
    cur<Q.length ? renderQ() : showLoad();
  },260);
}

function showLoad(){
  g("prog").style.width="100%";
  show("s-loading");
  setTimeout(showResult,1400);
}

function showResult(){
  var mx="sage", mv=0;
  Object.keys(sc).forEach(function(k){if(sc[k]>mv){mv=sc[k];mx=k;}});
  curType=mx;
  var r=R[mx];
  g("wrap").className="wrap "+r.cls;
  var riEl=document.getElementById('ri-'+mx);
  var icoEl=g('rc-ico');
  if(riEl){icoEl.innerHTML='<img src="'+riEl.src+'" alt="'+r.name+'">';}
  else{icoEl.textContent=r.icon;}
  g("rc-arch").textContent=r.arch;
  g("rc-name").textContent=r.name;
  g("rc-short").textContent=r.short;
  var kc=g("rc-kws"); kc.innerHTML="";
  r.kws.forEach(function(k){
    var s=document.createElement("span");
    s.className="rc-kw"; s.textContent="#"+k;
    kc.appendChild(s);
  });
  g("r-detail").innerHTML=r.desc;
  show("s-result");
}

/* ── 이미지 저장 ──
   share-card의 배경색을 명시적으로 전달해서
   html2canvas가 투명 배경으로 저장하는 문제 방지 */
async function saveImg(){
  var btn=g("save-btn");
  btn.classList.add("busy"); btn.textContent="⏳ 저장 중...";
  try {
    var card=g("share-card");
    var bg=getComputedStyle(card).backgroundColor;
    var canvas=await html2canvas(card,{
      scale:3,
      useCORS:true,
      backgroundColor: bg || "#F5EFE4",
      logging:false
    });
    var a=document.createElement("a");
    a.download="내도자기유형_"+R[curType].name+".png";
    a.href=canvas.toDataURL("image/png");
    a.click();
    showToast("이미지가 저장됐어요 🎉");
  } catch(e){
    showToast("저장에 실패했어요.");
  }
  btn.classList.remove("busy"); btn.textContent="📥 이미지 저장";
}

/* ── 링크 복사 ──
   clipboard API 실패 시 execCommand 폴백 */
function copyLink(){
  var url=location.href;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url)
      .then(function(){showToast("링크가 복사됐어요 📋");})
      .catch(function(){fallbackCopy(url);});
  } else {
    fallbackCopy(url);
  }
}
function fallbackCopy(text){
  var ta=document.createElement("textarea");
  ta.value=text;
  ta.style.cssText="position:fixed;top:-9999px;left:-9999px;";
  document.body.appendChild(ta);
  ta.select();
  try{
    document.execCommand("copy");
    showToast("링크가 복사됐어요 📋");
  }catch(e){
    showToast("주소창의 링크를 직접 복사해주세요.");
  }
  document.body.removeChild(ta);
}

function showToast(msg){
  var t=g("toast"); t.textContent=msg; t.classList.add("on");
  setTimeout(function(){t.classList.remove("on");},2600);
}
function restart(){
  g("wrap").className="wrap";
  show("s-start");
}
</script>
